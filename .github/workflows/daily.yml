name: Fetch N Calculator Data Daily

on:
  schedule:
    - cron: "0 3 * * 1-5"   # 10:00 ICT
    - cron: "0 4 * * 1-5"   # 11:00 ICT
    - cron: "0 5 * * 1-5"   # 12:00 ICT
    - cron: "0 7 * * 1-5"   # 14:00 ICT
    - cron: "0 8 * * 1-5"   # 15:00 ICT
    - cron: "0 10 * * 1-5"  # 17:00 ICT (đóng cửa)
  workflow_dispatch:           # Cho phép chạy tay trên GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment: SUPABASE

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main.py
